name: Android Debug APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: >-
            platform-tools
            platforms;android-31
            build-tools;31.0.0
            ndk;26.1.10909125

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Generate Android project (idempotent)
        run: cd src-tauri && npx @tauri-apps/cli@2 android init --ci

      - name: Pin targetSdk to 31 (compileSdk left at init default to satisfy AndroidX)
        run: |
          set -e
          GRADLE_FILES=$(find src-tauri/gen/android -maxdepth 3 -type f \( -name "build.gradle" -o -name "build.gradle.kts" \))
          if [ -z "$GRADLE_FILES" ]; then
            echo "::error::No build.gradle found under src-tauri/gen/android"
            exit 1
          fi
          for GRADLE in $GRADLE_FILES; do
            echo "--- before: $GRADLE ---"
            grep -nE 'compileSdk|targetSdk|minSdk' "$GRADLE" || true
            sed -i -E 's/(targetSdk *= *)[0-9]+/\131/' "$GRADLE"
            sed -i -E 's/(minSdk *= *)[0-9]+/\124/' "$GRADLE"
            echo "--- after: $GRADLE ---"
            grep -nE 'compileSdk|targetSdk|minSdk' "$GRADLE" || true
          done

      - name: Build Debug APK
        run: cd src-tauri && npx @tauri-apps/cli@2 android build --apk --debug

      - name: Locate APK
        id: locate
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found"
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK at: $APK"
          ls -la "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error