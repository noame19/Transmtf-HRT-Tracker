name: Android Debug APK

on:
  workflow_dispatch:

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: >-
            platform-tools
            platforms;android-31
            build-tools;31.0.0
            ndk;26.1.10909125

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (Vite to dist)
        run: npm run build

      - name: Verify dist/index.html exists
        run: ls -la dist/index.html && echo 'OK dist/index.html present'

      - name: Generate Android project (idempotent)
        run: cd src-tauri && npx @tauri-apps/cli@2 android init --ci

      - name: Inject DownloadWriter.kt into generated Android project
        run: |
          set -e
          KOTLIN_DIR="src-tauri/gen/android/app/src/main/java/com/smirnovayama/hrttracker"
          mkdir -p "$KOTLIN_DIR"
          cp src-tauri/scripts/DownloadWriter.kt "$KOTLIN_DIR/"
          cp src-tauri/scripts/NativeBridge.kt "$KOTLIN_DIR/"
          echo "--- DownloadWriter.kt injected ---"
          ls -la "$KOTLIN_DIR/DownloadWriter.kt"
          echo "--- NativeBridge.kt injected ---"
          ls -la "$KOTLIN_DIR/NativeBridge.kt"

      - name: Patch MainActivity.kt to call NativeBridge.initializeAndroidContext(this)
        run: |
          set -e
          MAIN_ACTIVITY="src-tauri/gen/android/app/src/main/java/com/smirnovayama/hrttracker/MainActivity.kt"
          if [ ! -f "$MAIN_ACTIVITY" ]; then
            echo "::error::MainActivity.kt not found at $MAIN_ACTIVITY"
            exit 1
          fi
          echo "--- before: $MAIN_ACTIVITY ---"
          cat "$MAIN_ACTIVITY"
          if grep -q "NativeBridge.initializeAndroidContext" "$MAIN_ACTIVITY"; then
            echo "--- already patched ---"
          else
            # Insert the ndk-context init call right after super.onCreate(...).
            # Without this, with_android_env() panics at ndk-context-0.1.1/src/lib.rs:72:30
            # because tao 0.35.3 dropped the ndk_glue auto-init path.
            python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("src-tauri/gen/android/app/src/main/java/com/smirnovayama/hrttracker/MainActivity.kt")
          src = p.read_text(encoding="utf-8")
          call = "        NativeBridge.initializeAndroidContext(this)\n"
          patched = re.sub(
              r"(super\.onCreate\(savedInstanceState\)\n)",
              lambda m: m.group(1) + call,
              src,
              count=1,
          )
          if patched == src:
              raise SystemExit("MainActivity.kt: super.onCreate(...) not found — aborting")
          p.write_text(patched, encoding="utf-8")
          PY
          fi
          echo "--- after: $MAIN_ACTIVITY ---"
          cat "$MAIN_ACTIVITY"

      - name: Patch AndroidManifest.xml with WRITE_EXTERNAL_STORAGE (maxSdkVersion=28)
        run: |
          set -e
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::AndroidManifest.xml not found"
            exit 1
          fi
          if grep -q "WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            echo "--- already patched ---"
            cat "$MANIFEST"
          else
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n</manifest>|' "$MANIFEST"
            echo "--- patched manifest ---"
            cat "$MANIFEST"
          fi

      - name: Copy frontend dist into Android assets/public
        run: |
          set -e
          ASSETS_DIR="src-tauri/gen/android/app/src/main/assets"
          mkdir -p "$ASSETS_DIR/public"
          cp -r dist/. "$ASSETS_DIR/public/"
          echo "--- assets/public contents ---"
          ls -la "$ASSETS_DIR/public"
          echo "--- assets/public/assets (subdir) ---"
          ls -la "$ASSETS_DIR/public/assets" 2>/dev/null || true

      - name: Pin targetSdk to 31 (compileSdk left at init default to satisfy AndroidX)
        run: |
          set -e
          GRADLE_FILES=$(find src-tauri/gen/android -maxdepth 3 -type f \( -name "build.gradle" -o -name "build.gradle.kts" \))
          if [ -z "$GRADLE_FILES" ]; then
            echo "::error::No build.gradle found under src-tauri/gen/android"
            exit 1
          fi
          for GRADLE in $GRADLE_FILES; do
            echo "--- before: $GRADLE ---"
            grep -nE 'compileSdk|targetSdk|minSdk' "$GRADLE" || true
            sed -i -E 's/(targetSdk *= *)[0-9]+/\131/' "$GRADLE"
            sed -i -E 's/(minSdk *= *)[0-9]+/\124/' "$GRADLE"
            echo "--- after: $GRADLE ---"
            grep -nE 'compileSdk|targetSdk|minSdk' "$GRADLE" || true
          done

      - name: Build Debug APK
        run: cd src-tauri && npx @tauri-apps/cli@2 android build --apk --debug

      - name: Locate APK
        id: locate
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found"
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK at: $APK"
          ls -la "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error