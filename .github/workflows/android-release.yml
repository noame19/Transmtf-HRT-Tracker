name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: >-
            platform-tools
            platforms;android-31
            build-tools;31.0.0
            ndk;26.1.10909125

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (Vite to dist)
        run: npm run build

      - name: Verify dist/index.html exists
        run: ls -la dist/index.html && echo 'OK dist/index.html present'

      - name: Generate Android project (idempotent)
        run: cd src-tauri && npx @tauri-apps/cli@2 android init --ci

      - name: Inject DownloadWriter.kt into generated Android project
        run: |
          set -e
          KOTLIN_DIR="src-tauri/gen/android/app/src/main/java/com/smirnovayama/hrttracker"
          mkdir -p "$KOTLIN_DIR"
          cp src-tauri/scripts/DownloadWriter.kt "$KOTLIN_DIR/"
          echo "--- DownloadWriter.kt injected ---"
          ls -la "$KOTLIN_DIR/DownloadWriter.kt"

      - name: Patch AndroidManifest.xml with WRITE_EXTERNAL_STORAGE (maxSdkVersion=28)
        run: |
          set -e
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::AndroidManifest.xml not found"
            exit 1
          fi
          if grep -q "WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            echo "--- already patched ---"
            cat "$MANIFEST"
          else
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n</manifest>|' "$MANIFEST"
            echo "--- patched manifest ---"
            cat "$MANIFEST"
          fi

      - name: Copy frontend dist into Android assets/public
        run: |
          set -e
          ASSETS_DIR="src-tauri/gen/android/app/src/main/assets"
          mkdir -p "$ASSETS_DIR/public"
          cp -r dist/. "$ASSETS_DIR/public/"
          echo "--- assets/public contents ---"
          ls -la "$ASSETS_DIR/public"
          echo "--- assets/public/assets (subdir) ---"
          ls -la "$ASSETS_DIR/public/assets" 2>/dev/null || true

      - name: Pin targetSdk to 31 (compileSdk left at init default to satisfy AndroidX)
        run: |
          set -e
          GRADLE_FILES=$(find src-tauri/gen/android -maxdepth 3 -type f \( -name "build.gradle" -o -name "build.gradle.kts" \))
          if [ -z "$GRADLE_FILES" ]; then
            echo "::error::No build.gradle found under src-tauri/gen/android"
            exit 1
          fi
          for GRADLE in $GRADLE_FILES; do
            echo "--- before: $GRADLE ---"
            grep -nE 'compileSdk|targetSdk|minSdk' "$GRADLE" || true
            sed -i -E 's/(targetSdk *= *)[0-9]+/\131/' "$GRADLE"
            sed -i -E 's/(minSdk *= *)[0-9]+/\124/' "$GRADLE"
            echo "--- after: $GRADLE ---"
            grep -nE 'compileSdk|targetSdk|minSdk' "$GRADLE" || true
          done

      - name: Disable release lint check (targetSdk 31 < 33 triggers ExpiredTargetSdkVersion)
        run: |
          set -e
          APP_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ]; then
            if grep -q "checkReleaseBuilds" "$APP_GRADLE"; then
              echo "--- lint already configured ---"
            else
              # Inject lint { checkReleaseBuilds = false } inside android { } block
              sed -i 's|android {|android {\n    lint {\n        checkReleaseBuilds = false\n    }|' "$APP_GRADLE"
            fi
            echo "--- after: $APP_GRADLE (lint section) ---"
            grep -nA2 "lint {" "$APP_GRADLE" || true
          fi

      - name: Build Release APK
        run: cd src-tauri && npx @tauri-apps/cli@2 android build --apk

      - name: Locate APK
        id: locate
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found"
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK at: $APK"
          ls -la "$APK"

      - name: Generate release keystore (project-local, not committed)
        run: |
          set -e
          KEYSTORE_DIR="$HOME/.android"
          mkdir -p "$KEYSTORE_DIR"
          KEYSTORE="$KEYSTORE_DIR/release.keystore"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair \
              -keystore "$KEYSTORE" \
              -storepass android \
              -keypass android \
              -alias hrt-tracker \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=HRT Tracker, O=Transmtf, C=CN"
            echo "--- keystore generated ---"
          else
            echo "--- keystore already exists, reusing ---"
          fi
          ls -la "$KEYSTORE"

      - name: Sign and align release APK
        run: |
          set -e
          UNSIGNED_APK="${{ steps.locate.outputs.apk_path }}"
          KEYSTORE="$HOME/.android/release.keystore"
          KEY_ALIAS="hrt-tracker"
          STORE_PASS="android"
          KEY_PASS="android"
          BUILD_TOOLS_DIR=$(ls -d /usr/local/lib/android/sdk/build-tools/* | sort -V | tail -n 1)
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          echo "--- using build-tools: $BUILD_TOOLS_DIR ---"
          ALIGNED_APK="${UNSIGNED_APK%.apk}-aligned.apk"
          SIGNED_APK="${UNSIGNED_APK%.apk}-signed.apk"
          "$ZIPALIGN" -v -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"
          "$APKSIGNER" verify --verbose "$SIGNED_APK"
          echo "signed_apk_path=$SIGNED_APK" >> $GITHUB_OUTPUT
          ls -la "$SIGNED_APK"
        id: sign

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ steps.sign.outputs.signed_apk_path }}
          if-no-files-found: error