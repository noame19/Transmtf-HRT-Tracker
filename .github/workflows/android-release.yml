name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: "Add Android Rust targets (arm-only release: arm64-v8a + armeabi-v7a)"
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: >-
            platform-tools
            platforms;android-31
            build-tools;31.0.0
            ndk;26.1.10909125

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (Vite to dist)
        run: npm run build

      - name: Verify dist/index.html exists
        run: ls -la dist/index.html && echo 'OK dist/index.html present'

      - name: Generate Android project (idempotent)
        run: cd src-tauri && npx @tauri-apps/cli@2 android init --ci

      - name: Inject DownloadWriter.kt into generated Android project
        run: |
          set -e
          KOTLIN_DIR="src-tauri/gen/android/app/src/main/java/com/smirnovayama/hrttracker"
          mkdir -p "$KOTLIN_DIR"
          cp src-tauri/scripts/DownloadWriter.kt "$KOTLIN_DIR/"
          echo "--- DownloadWriter.kt injected ---"
          ls -la "$KOTLIN_DIR/DownloadWriter.kt"

      - name: Patch AndroidManifest.xml with WRITE_EXTERNAL_STORAGE (maxSdkVersion=28)
        run: |
          set -e
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::AndroidManifest.xml not found"
            exit 1
          fi
          if grep -q "WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            echo "--- already patched ---"
            cat "$MANIFEST"
          else
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n</manifest>|' "$MANIFEST"
            echo "--- patched manifest ---"
            cat "$MANIFEST"
          fi

      - name: Copy frontend dist into Android assets/public
        run: |
          set -e
          ASSETS_DIR="src-tauri/gen/android/app/src/main/assets"
          mkdir -p "$ASSETS_DIR/public"
          cp -r dist/. "$ASSETS_DIR/public/"
          echo "--- assets/public contents ---"
          ls -la "$ASSETS_DIR/public"
          echo "--- assets/public/assets (subdir) ---"
          ls -la "$ASSETS_DIR/public/assets" 2>/dev/null || true

      - name: Pin targetSdk to 31 (compileSdk left at init default to satisfy AndroidX)
        run: |
          set -e
          GRADLE_FILES=$(find src-tauri/gen/android -maxdepth 3 -type f \( -name "build.gradle" -o -name "build.gradle.kts" \))
          if [ -z "$GRADLE_FILES" ]; then
            echo "::error::No build.gradle found under src-tauri/gen/android"
            exit 1
          fi
          for GRADLE in $GRADLE_FILES; do
            echo "--- before: $GRADLE ---"
            grep -nE 'compileSdk|targetSdk|minSdk' "$GRADLE" || true
            sed -i -E 's/(targetSdk *= *)[0-9]+/\131/' "$GRADLE"
            sed -i -E 's/(minSdk *= *)[0-9]+/\124/' "$GRADLE"
            echo "--- after: $GRADLE ---"
            grep -nE 'compileSdk|targetSdk|minSdk' "$GRADLE" || true
          done

      - name: Disable release lint check (targetSdk 31 < 33 triggers ExpiredTargetSdkVersion)
        run: |
          set -e
          APP_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ]; then
            if grep -q "checkReleaseBuilds" "$APP_GRADLE"; then
              echo "--- lint already configured ---"
            else
              # Inject lint { checkReleaseBuilds = false } inside android { } block
              sed -i 's|android {|android {\n    lint {\n        checkReleaseBuilds = false\n    }|' "$APP_GRADLE"
            fi
            echo "--- after: $APP_GRADLE (lint section) ---"
            grep -nA2 "lint {" "$APP_GRADLE" || true
          fi

      - name: Materialize release keystore (Gradle signing)
        run: |
          set -e
          if [ -z "${{ secrets.ANDROID_KEYSTORE_B64 }}" ]; then
            echo "::error::ANDROID_KEYSTORE_B64 secret is empty — set it in repo Settings → Secrets → Actions"
            exit 1
          fi
          # Decode the keystore to a runner-local path (gitignored, ephemeral).
          KEYSTORE_FILE="$RUNNER_TEMP/release.keystore"
          echo -n "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > "$KEYSTORE_FILE"
          ls -la "$KEYSTORE_FILE"
          # Tauri 2 release signing is wired through Gradle. The official
          # pattern (https://v2.tauri.app/distribute/sign/android) is:
          #   1. Drop a keystore.properties file next to settings.gradle
          #   2. Add a signingConfigs.release block to app/build.gradle.kts
          #      that reads those properties at build time
          #   3. Wire buildTypes.release.signingConfig to that config
          # We do step 1 here; step 2+3 are injected as a separate patch step
          # below (idempotent — skips if already wired).
          KEYSTORE_PROPS="src-tauri/gen/android/keystore.properties"
          cat > "$KEYSTORE_PROPS" <<EOF
          storeFile=$KEYSTORE_FILE
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "--- keystore.properties ---"
          cat "$KEYSTORE_PROPS"

      - name: Build Release APK
        run: cd src-tauri && npx @tauri-apps/cli@2 android build --apk

      - name: Locate unsigned APK
        id: locate-unsigned
        run: |
          # v1.3.0 `tauri android build` emits an UNSIGNED release APK
          # under gen/android/app/build/outputs/apk/release/. We zipalign
          # + apksigner-sign it ourselves so the generated
          # app/build.gradle.kts stays untouched (the earlier Python
          # injection of `signingConfigs { create("release") { ... } }`
          # broke the Kotlin DSL with `Unresolved reference` errors).
          UNSIGNED=$(find src-tauri/gen/android -path "*/release/*.apk" -type f | head -n 1)
          if [ -z "$UNSIGNED" ]; then
            echo "::error::No unsigned release APK found"
            find src-tauri/gen/android -name "*.apk" -type f || true
            exit 1
          fi
          echo "unsigned_apk=$UNSIGNED" >> $GITHUB_OUTPUT
          echo "Unsigned APK at: $UNSIGNED"
          ls -la "$UNSIGNED"

      - name: Zipalign unsigned APK
        run: |
          set -e
          UNSIGNED="${{ steps.locate-unsigned.outputs.unsigned_apk }}"
          ALIGNED="${UNSIGNED%.apk}-aligned.apk"
          # -p 4 = 4-byte page alignment, required since API 24+;
          # -f    = force overwrite if ALIGNED already exists.
          "$ANDROID_HOME/build-tools/31.0.0/zipalign" -p -f 4 "$UNSIGNED" "$ALIGNED"
          ls -la "$ALIGNED"

      - name: Inspect keystore (diagnostic: list aliases + key fingerprints)
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          ls -la "$KEYSTORE_FILE"
          # List every alias + key fingerprint + the encryption algorithm
          # the key entry uses. Surfaces 3 things we otherwise have to
          # guess:
          #   1. Whether `hrttracker` is actually an alias in this keystore
          #      (a wrong alias = "Get Key failed: null" instead of
          #      BadPaddingException, so the symptom tells us which way
          #      to look).
          #   2. The key algorithm (RSA vs EC) — apksigner wants RSA/EC
          #      keys, DSA gives "unsupported algorithm".
          #   3. Whether the key entry is password-protected separately
          #      from the keystore. If the SHA-1 fingerprint prints,
          #      the store password is correct.
          keytool -list -v \
              -keystore "$KEYSTORE_FILE" \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" || {
                echo "::error::keytool -list failed — store password likely wrong"
                exit 1
              }

      - name: Sign APK with apksigner
        id: sign-apk
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEY_ALIAS: hrttracker
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          # PKCS12 keystores produced by `keytool -genkey` use the same
          # password for the key entry as for the store, UNLESS the user
          # explicitly typed a different one at the
          # "Enter key password for <alias> (RETURN if same as keystore
          # password):" prompt. We try the dedicated secret first so
          # users with a distinct key password keep their setup, and
          # fall back to the store password otherwise.
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          UNSIGNED="${{ steps.locate-unsigned.outputs.unsigned_apk }}"
          ALIGNED="${UNSIGNED%.apk}-aligned.apk"
          SIGNED="${UNSIGNED%.apk}-signed.apk"
          ls -la "$KEYSTORE_FILE"
          "$ANDROID_HOME/build-tools/31.0.0/apksigner" sign \
              --ks "$KEYSTORE_FILE" \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --out "$SIGNED" \
              "$ALIGNED"
          # Sanity-check the signature is actually attached.
          "$ANDROID_HOME/build-tools/31.0.0/apksigner" verify --verbose "$SIGNED" | head -n 40
          echo "signed_apk=$SIGNED" >> $GITHUB_OUTPUT
          ls -la "$SIGNED"

      - name: Locate signed APK
        id: locate
        run: |
          SIGNED="${{ steps.sign-apk.outputs.signed_apk }}"
          # Belt-and-suspenders: fall back to a re-scan if the step-handoff
          # somehow misfires (e.g. `$GITHUB_OUTPUT` write race).
          if [ -z "$SIGNED" ] || [ ! -f "$SIGNED" ]; then
            SIGNED=$(find src-tauri/gen/android -name "*-signed.apk" -type f | head -n 1)
          fi
          if [ -z "$SIGNED" ] || [ ! -f "$SIGNED" ]; then
            echo "::error::No signed APK found"
            exit 1
          fi
          echo "apk_path=$SIGNED" >> $GITHUB_OUTPUT
          echo "Signed APK at: $SIGNED"
          ls -la "$SIGNED"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error