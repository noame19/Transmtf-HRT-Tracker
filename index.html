
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>HRT Tracker</title>

    <!--
      ─── Theme bootstrap (must run BEFORE the stylesheet, BEFORE React mounts) ───
      The CSS-variable palette in src/index.css keys off `.dark` on <html>, and
      ThemeContext only adds that class inside a useEffect (i.e. AFTER React's
      first paint). On Android the cold-start window is a single WebView that
      paints white before React runs, then flashes to dark — visible FOUC.

      Fix: this synchronous inline script reads the user's saved preference
      from localStorage (same key ThemeContext writes: 'hrt-dark-mode') and
      injects the `.dark` class on <html> before any CSS is parsed or any
      React render happens. It also flips <body>'s inline background to the
      matching base so even the first frame paints in the correct theme.

      Must stay inline (not external): an external script can't run until
      fetched, which is after the first paint. Must stay synchronous: defer
      / async would defer until DOMContentLoaded — already too late.
      Must use try/catch around localStorage: WebView private mode or some
      Android OEM WebViews throw on access; fallback to light defaults.
    -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('hrt-dark-mode');
                var isDark = saved === '1' || saved === 'true';
                if (isDark) {
                    document.documentElement.classList.add('dark');
                }
                // Also set a background on <html> so the very first frame
                // (before body parses) already has the right color. Without
                // this we get a ~16ms flash of white between WebView init
                // and body parse on slow devices.
                document.documentElement.style.backgroundColor = isDark ? '#0b1120' : '#f1f5f9';
            } catch (_) {
                // private mode / disabled storage — leave defaults (light)
            }
        })();
    </script>

    <!--
      Local CSS — Tailwind preflight + utilities, then app tokens (.dark
      overrides, .glass-* system, animations, !important-free utility
      overrides) are compiled at build time by PostCSS and served from
      this link. Previously the app loaded Tailwind via the runtime Play
      CDN (https://cdn.tailwindcss.com) and inlined the rest as a <style>
      block; both are now gone — see src/index.css. Working offline (incl.
      Tauri Android WebView cold start) no longer requires hitting any
      third-party host.
    -->
    <link rel="stylesheet" href="/src/index.css">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
